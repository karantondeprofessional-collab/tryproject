<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Harmony Music</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg, #ffdee9, #b5fffc);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Floating Blobs */
.blob{
    position:fixed;
    border-radius:50%;
    filter: blur(90px);
    opacity:0.5;
    z-index:-1;
    animation: move 12s infinite alternate ease-in-out;
}

.blob1{
    width:300px;
    height:300px;
    background:#ff9a9e;
    top:10%;
    left:5%;
}

.blob2{
    width:350px;
    height:350px;
    background:#a18cd1;
    bottom:10%;
    right:5%;
}

@keyframes move{
    from{ transform:translateY(0px); }
    to{ transform:translateY(60px); }
}

/* Form Container */
.register-container{
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    padding:40px;
    border-radius:25px;
    width:350px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    text-align:center;
}

.register-container h2{
    margin-bottom:25px;
    font-size:28px;
    background: linear-gradient(45deg,#ff4e88,#6a5acd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* Input Fields */
.input-group{
    margin-bottom:20px;
    text-align:left;
}

.input-group label{
    font-size:14px;
    color:#444;
}

.input-group input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.9);
    box-shadow:inset 0 2px 5px rgba(0,0,0,0.1);
    transition:0.3s;
}

.input-group input:focus{
    box-shadow:0 0 10px #ff4e88;
}

/* Button */
.register-btn{
    width:100%;
    padding:14px;
    background: linear-gradient(45deg,#ff4e88,#6a5acd);
    border:none;
    border-radius:40px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.register-btn:hover{
    transform:scale(1.05);
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

/* Login Link */
.login-link{
    margin-top:15px;
    font-size:14px;
}

.login-link a{
    text-decoration:none;
    color:#6a5acd;
    font-weight:600;
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="register-container">
    <h2>Create Account 🎵</h2>

    <form>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="register-btn">Register Now</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="index.html">Back to Home</a>
    </div>
</div>

</body>
</html>
